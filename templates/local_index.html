<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫微斗数命盘生成器（本地）</title>
    <link rel="stylesheet" href="form_input.css">
    <link rel="stylesheet" href="form_chart.css">
    <link rel="stylesheet" href="form_sava_mingpan.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='form_input.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='form_chart.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='form_sava_mingpan.css') }}">
</head>
<body>
    <div class="main-container">
        <!-- 左侧输入区域 -->
        <div class="input-section">
            <h2>信息输入</h2>
            <hr/>
            <form id="ziweiForm">
                <div class="form-group">
                    <label for="name">姓名（可选）</label>
                    <input type="text" id="name" class="form-control" placeholder="请输入姓名">
                </div>
                <!-- 时间输入行 -->
                <div class="time-input-row">
                    <div class="time-input-group">
                        <label for="birthYear">年</label>
                        <input type="number" id="birthYear" class="form-control" min="1" max="9999" required>
                        <span class="gan-display" id="yearGan"></span>
                    </div>
                    
                    <div class="time-input-group">
                        <label for="birthMonth">月</label>
                        <input type="number" id="birthMonth" class="form-control" min="1" max="12" required>
                        <span class="gan-display" id="monthGan"></span>
                    </div>
                    
                    <div class="time-input-group">
                        <label for="birthDay">日</label>
                        <input type="number" id="birthDay" class="form-control" min="1" max="31" required>
                        <span class="gan-display" id="dayGan"></span>
                    </div>
                    
                    <div class="time-input-group">
                        <label for="birthHour">时</label>
                        <input type="number" id="birthHour" class="form-control" min="0" max="23.5" step="0.1" required>
                        <span class="gan-display" id="hourGan"></span>
                    </div>
                </div>
                <div class="time-input-row">    
                    <div class="time-input-group">
                        <label for="gender">性别</label>
                        <select id="gender" class="form-control" required>
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                    <div class="time-input-group">
                        <label for="birthPlace">出生地</label>
                        <input type="text" id="birthPlace" class="form-control" placeholder="例如：北京" required value="北京">
                        
                    </div>
                </div>
                <div class="info-text" id="solarTimeInfo" ></div>
                <div class="info-text" id="lunarDateInfo" ></div>
                <hr/>
                <div class="form-group">
                    <button type="button" id="randomTimeBtn" class="btn btn-random">随机出生时间</button>
                    <button type="submit" id="submitBtn" class="btn">生成命盘</button>
                </div>
            </form>

            <!-- 新增保存和分类区域 -->
            <div class="save-section">
                <div class="save-controls">
                    <select id="categorySelect" class="category-select">
                        <option value="all">全部</option>
                        <option value="new">新分类</option>
                        <!-- 其他分类将从服务器动态加载 -->
                    </select>
                    <button type="button" id="saveBtn" class="btn btn-save">保存命盘</button>
                </div>
                <div id="savedList" class="saved-list">
                    <div class="empty-list">暂无保存的命盘</div>
                </div>
            </div>   

            <div class="upload-section">
                <input type="file" id="jsonFile" accept=".json">
                <button onclick="loadJsonFile()">加载命盘数据</button>
            </div>    

            <div class="loading" id="loadingIndicator">
                <div class="loading-spinner"></div>
                <p>正在计算命盘，请稍候...</p>
            </div>
        </div>
        
        <!-- 右侧命盘显示区域 -->
        <div class="chart-section">
            <div class="container">
                <div class="chart-grid" id="chartGrid">
                    <!-- 宫位将由JavaScript动态生成 -->
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="sihua sihua-lu">禄</span> 化禄</div>
                    <div class="legend-item"><span class="sihua sihua-quan">权</span> 化权</div>
                    <div class="legend-item"><span class="sihua sihua-ke">科</span> 化科</div>
                    <div class="legend-item"><span class="sihua sihua-ji">忌</span> 化忌</div>
                    <div class="legend-item">▲ 向心四化</div>
                    <div class="legend-item">▼ 离心四化</div>
                </div>                 
            </div>    
        </div>
    </div>



    <!-- 确认删除对话框 -->
    <div id="confirmDeleteDialog" class="confirm-dialog" style="display: none;">
        <div class="dialog-content">
            <div class="dialog-title">确认删除</div>
            <div class="dialog-message" id="deleteMessage">您确定要删除此命盘记录吗？此操作不可恢复。</div>
            <div class="dialog-buttons">
                <button id="confirmDeleteBtn" class="dialog-btn dialog-confirm">确认删除</button>
                <button id="cancelDeleteBtn" class="dialog-btn dialog-cancel">取消</button>
            </div>
        </div>
    </div>
    <!-- 新分类对话框 -->
    <div id="newCategoryDialog" class="new-category-dialog" style="display: none;">
        <div class="new-category-content">
            <div class="dialog-title">创建新分类</div>
            <div class="form-group">
                <label for="newCategoryName" class="form-label">新分类名称：</label>
                <input type="text" id="newCategoryName" class="form-input" placeholder="请输入新分类名称">
            </div>
            <div class="dialog-buttons">
                <button id="confirmNewCategory" class="dialog-btn btn-confirm">创建</button>
                <button id="cancelNewCategory" class="dialog-btn btn-cancel">取消</button>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        // 加载JSON文件
        function loadJsonFile() {
            const fileInput = document.getElementById('jsonFile');
            if (!fileInput) {
                showError('找不到文件输入元素');
                return;
            }
            
            const file = fileInput.files[0];
            
            if (!file) {
                showError('请选择JSON文件');
                return;
            }
                        
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);            
                    renderChart(data);
                } catch (error) {
                    showError('解析JSON文件时出错: ' + error.message);
                }
            };
            reader.onerror = function() {
                showError('读取文件时发生错误');
            };
            reader.readAsText(file);
        }
    </script>
    <script type="text/javascript" src="./ziwei_chart.js"></script>
    <script type="text/javascript" src="./ziwei_input.js"></script>
    <script type="text/javascript" src="./ziwei_form.js"></script>
    <script type="text/javascript" src="./ziwei_save_mingpan.js"></script>
    

    <script src="{{ url_for('static', filename='ziwei_chart.js') }}"></script>
    <script src="{{ url_for('static', filename='ziwei_input.js') }}"></script>
    <script src="{{ url_for('static', filename='ziwei_form.js') }}"></script>
    <script src="{{ url_for('static', filename='ziwei_save_mingpan.js') }}"></script>
</body>
</html>
